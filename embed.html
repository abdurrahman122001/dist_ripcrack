<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RipCrack Chat Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f9fafb;
    }
    .chat-header {
      background: linear-gradient(135deg, #059669, #047857);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-info h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .chat-header-info p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 2px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .message {
      margin-bottom: 12px;
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      background: #059669;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: white;
      color: #1f2937;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .message.bot a {
      color: #059669;
    }
    .chat-input-area {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: #059669;
    }
    .chat-send {
      background: #059669;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .chat-send:hover {
      background: #047857;
    }
    .chat-send:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-items: center;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .email-form {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e5e7eb;
    }
    .email-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .email-button {
      width: 100%;
      background: #059669;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    .email-button:hover {
      background: #047857;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="chat-header-info">
      <h1>RipCrack Support</h1>
      <p>We typically reply in a few minutes</p>
    </div>
  </div>
  
  <div class="chat-messages" id="messages"></div>
  
  <div class="email-form" id="email-form" style="display: none;">
    <input type="email" class="email-input" id="email-input" placeholder="Enter your email for human support...">
    <button class="email-button" id="email-submit">Start Chat with Human</button>
  </div>
  
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chat-input" placeholder="Type your message...">
    <button class="chat-send" id="chat-send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const apiKey = urlParams.get('apiKey') || 'default';
      const apiUrl = window.location.origin;
      
      let deviceId = localStorage.getItem('chat_device_id');
      if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('chat_device_id', deviceId);
      }

      let sessionId = localStorage.getItem('chat_session_id');
      let userEmail = localStorage.getItem('chat_user_email');

      const messages = document.getElementById('messages');
      const input = document.getElementById('chat-input');
      const send = document.getElementById('chat-send');
      const emailForm = document.getElementById('email-form');
      const emailInput = document.getElementById('email-input');
      const emailSubmit = document.getElementById('email-submit');

      function addMessage(role, text) {
        const msg = document.createElement('div');
        msg.className = 'message ' + role;
        msg.innerHTML = text;
        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;
      }

      function showTyping() {
        const typing = document.createElement('div');
        typing.className = 'message bot';
        typing.id = 'typing';
        typing.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        messages.appendChild(typing);
        messages.scrollTop = messages.scrollHeight;
      }

      function hideTyping() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
      }

      // Welcome message
      addMessage('bot', 'Hello! 👋 Welcome to RipCrack. How can I help you today? You can ask me about:<br><br>• Our software products<br>• Pricing and plans<br>• Order status<br>• Or type "human" to chat with our support team');

      async function sendMessage(text) {
        addMessage('user', text);
        showTyping();
        send.disabled = true;

        try {
          const response = await fetch(apiUrl + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              deviceId: deviceId,
              email: userEmail,
              sessionId: sessionId,
              apiKey: apiKey
            })
          });

          const data = await response.json();
          hideTyping();

          if (data.sessionId) {
            sessionId = data.sessionId;
            localStorage.setItem('chat_session_id', sessionId);
          }

          if (text.toLowerCase().includes('human') || text.toLowerCase().includes('support')) {
            if (!userEmail) {
              emailForm.style.display = 'block';
              addMessage('bot', 'To connect you with a human agent, please provide your email address.');
              return;
            }
          }

          addMessage('bot', data.answer || data.message || 'I\'m not sure how to help with that.');
        } catch (err) {
          hideTyping();
          addMessage('bot', 'Sorry, I\'m having trouble connecting. Please try again.');
        } finally {
          send.disabled = false;
        }
      }

      send.addEventListener('click', () => {
        const text = input.value.trim();
        if (text) {
          input.value = '';
          sendMessage(text);
        }
      });

      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const text = input.value.trim();
          if (text) {
            input.value = '';
            sendMessage(text);
          }
        }
      });

      emailSubmit.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        if (!email || !email.includes('@')) {
          alert('Please enter a valid email');
          return;
        }
        userEmail = email;
        localStorage.setItem('chat_user_email', email);
        emailForm.style.display = 'none';
        
        await fetch(apiUrl + '/api/chat/transfer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, email, deviceId })
        });
        
        addMessage('bot', '✅ A human agent will be with you shortly!');
      });

      // Track page view
      fetch(apiUrl + '/api/chat/track-page', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId, url: document.referrer, apiKey })
      }).catch(() => {});
    })();
  </script>
</body>
</html>
